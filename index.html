function ci(e,c,o,active){
var s=o?24:28;if(active)s=32;
var op=o?.55:1;var bd=o?'dashed':'solid';
var shadow=active?'0 2px 8px rgba(196,164,78,.5)':'0 1px 5px rgba(0,0,0,.2)';
var border=active?'3px solid '+c:'2px '+bd+' '+c;
return L.divIcon({html:'<div style="width:'+s+'px;height:'+s+'px;display:flex;align-items:center;justify-content:center;font-size:'+(s-8)+'px;background:#fff;border:'+border+';border-radius:50%;box-shadow:'+shadow+';opacity:'+op+';transition:all .2s">'+e+'</div>',iconSize:[s,s],iconAnchor:[s/2,s/2],popupAnchor:[0,-s/2],className:active?'marker-bounce':''})
}

function im(i){
if(maps[i]){maps[i].invalidateSize();return}
var d=D[i];
var map=L.map('m'+i,{scrollWheelZoom:false,zoomControl:true}).setView(d.c,d.z);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
attribution:'© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>',
subdomains:'abcd',maxZoom:19}).addTo(map);

// Route line for non-option places
var routeCoords=d.p.filter(function(p){return !p.o}).map(function(p){return[p.la,p.ln]});
L.polyline(routeCoords,{color:'#C4A44E',weight:2,opacity:.35,dashArray:'6,8'}).addTo(map);

// Markers
markers[i]={};
d.p.forEach(function(p){
var mk=L.marker([p.la,p.ln],{icon:ci(p.e,p.c,p.o,false)}).addTo(map);
mk.bindPopup('<b>'+p.e+' '+p.n+'</b><div class="pop-type">'+p.t+'</div><a href="'+g(p.n)+'" target="_blank">Open in Google Maps →</a>');
mk._pdata=p;
markers[i][p.id]=mk;

// Click marker → highlight card in timetable
mk.on('click',function(){
var card=document.querySelector('[data-pin="'+p.id+'"]');
if(card){
clearActive(i);
card.classList.add('active');
activeCard=card;
card.scrollIntoView({behavior:'smooth',block:'center'});
}
});
});

// Legend
var leg=document.createElement('div');
leg.className='legend';
leg.innerHTML='<span><i style="background:#D4A89A"></i>Meal</span><span><i style="background:#8B9A7E"></i>Coffee</span><span><i style="background:#C4A44E"></i>Culture/Shop</span><span style="opacity:.6"><i style="background:#B8B0A4;border:1px dashed #999"></i>Option</span>';
document.getElementById('m'+i).appendChild(leg);

maps[i]=map;
document.getElementById('t'+i).innerHTML=TL[i];
bindCards(i);
}

function clearActive(i){
if(activeCard){activeCard.classList.remove('active');activeCard=null}
Object.values(markers[i]||{}).forEach(function(mk){
var p=mk._pdata;
mk.setIcon(ci(p.e,p.c,p.o,false));
});
}

function focusPin(dayIdx,pinId){
var mk=markers[dayIdx]&&markers[dayIdx][pinId];
if(!mk)return;
var map=maps[dayIdx];
var p=mk._pdata;
clearActive(dayIdx);
mk.setIcon(ci(p.e,p.c,p.o,true));
map.flyTo([p.la,p.ln],map.getZoom()<14?14:map.getZoom(),{duration:.5});
mk.openPopup();
// Scroll map into view
document.getElementById('m'+dayIdx).scrollIntoView({behavior:'smooth',block:'start'});
}

function bindCards(i){
document.querySelectorAll('#t'+i+' [data-pin]').forEach(function(card){
card.addEventListener('click',function(e){
if(e.target.tagName==='A')return; // don't intercept link clicks
var pinId=card.getAttribute('data-pin');
focusPin(i,pinId);
card.classList.add('active');
activeCard=card;
});
});
}
